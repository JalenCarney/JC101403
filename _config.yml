# =============================================================================
# ⚙️ SITE SETTINGS
# =============================================================================

title: "Zen's Hub"
email: "jalencarney@gmail.com"

description: >-
  The Peak — A showcase of creative development, gameplay systems,
  and interactive experiences by Zenith.

url: "https://JC101403.github.io"
baseurl: ""


# =============================================================================
# 🧑‍💻 BRANDING & SOCIAL
# =============================================================================

github_username: JC101403
twitter_username:

site_author: "Jalen Carney (Zenith)"
masthead_title: "Zen's Hub"
logo: # Optional: add later for stronger branding


# =============================================================================
# 🛠️ BUILD SETTINGS
# =============================================================================

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate

paginate: 5
words_per_minute: 200


# =============================================================================
# 🎨 THEME & UI
# =============================================================================

minimal_mistakes_skin: "neon"

# Global header styling
header_defaults: &header_defaults
  overlay_color: "#6C2BD9"   # slightly richer purple
  overlay_filter: 0.5
  overlay_image:             # add hero image later


# =============================================================================
# 📄 DEFAULT LAYOUTS
# =============================================================================

defaults:

  # -------------------------
  # Pages
  # -------------------------
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      header: *header_defaults
      author_profile: true

      # Table of Contents
      toc: true
      toc_label: "On This Page"
      toc_icon: "book"
      toc_sticky: true


  # -------------------------
  # Blog Posts
  # -------------------------
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      header: *header_defaults
      author_profile: true

      toc: true
      toc_label: "On This Page"
      toc_icon: "book"
      toc_sticky: true


  # -------------------------
  # Portfolio Items
  # -------------------------
  - scope:
      path: ""
      type: portfolio
    values:
      layout: portfolio-item
      header: *header_defaults
      author_profile: true

      sidebar:
        nav: "portfolio_sidebar"

      toc: true


# =============================================================================
# 📂 COLLECTIONS
# =============================================================================

collections:
  portfolio:
    output: true
    permalink: /portfolio/:path/


include:
  - _pages


# =============================================================================
# 👤 AUTHOR PROFILE
# =============================================================================

author:
  name: "Jalen Carney (Zenith)"
  avatar: "/assets/images/Artstation_Cover.jpg"
  bio: "Game Developer • Systems Designer • Creative Technologist"

  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/jalencarney"

    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/JalenCarney"

    - label: "Itch.io"
      icon: "fab fa-fw fa-itch-io"
      url: "https://jc1014.itch.io"

    - label: "ArtStation"
      icon: "fab fa-fw fa-artstation"
      url: "https://www.artstation.com/jc1014"


# =============================================================================
# 🚫 EXCLUDED FILES
# =============================================================================

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - .jekyll-cache
  - .jekyll-metadata